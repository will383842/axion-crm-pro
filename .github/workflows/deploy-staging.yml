name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build + push GHCR
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - { image: api,    dockerfile: Dockerfile.laravel,  target: prod }
          - { image: app,    dockerfile: Dockerfile.frontend, target: prod }
          - { image: worker, dockerfile: Dockerfile.worker,   target: prod }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/axion-crm-pro/${{ matrix.image }}:staging
            ghcr.io/${{ github.repository_owner }}/axion-crm-pro/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trigger-coolify:
    name: Trigger Coolify pull
    runs-on: ubuntu-24.04
    needs: build-and-push
    steps:
      - name: Webhook Coolify staging
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_STAGING_TOKEN }}" \
            "${{ secrets.COOLIFY_STAGING_WEBHOOK }}"

  smoke:
    name: Smoke staging
    runs-on: ubuntu-24.04
    needs: trigger-coolify
    steps:
      - name: Wait for staging
        run: sleep 60
      - name: GET /up
        run: curl -fsS https://staging-api.axion-crm-pro.com/up
      - name: GET app
        run: curl -fsS https://staging.axion-crm-pro.com -o /dev/null
