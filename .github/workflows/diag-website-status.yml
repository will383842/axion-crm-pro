name: Recover scraping + restore access

# Récupération complète (autorisée explicitement par Will, 2026-07-07) :
#   1. Restaure la cle SSH de Claude sur le serveur (acces direct permanent)
#   2. Relance la stack Docker (dont le conteneur `api` arrete)
#   3. Redemarre le service de scraping des sites web
#   4. Affiche l'etat + les compteurs de sites web (lecture Postgres directe)
# Declenchement MANUEL uniquement. Chemin .github/workflows/** => pas de deploy auto.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  recover:
    name: Recover + diag prod
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}

      - name: Trust host key
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Recover via SSH
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER || 'root' }}
        run: |
          set -e
          ssh -o StrictHostKeyChecking=no "$USER@$HOST" bash <<'EOF'
            set -uo pipefail
            cd /opt/axion-crm-pro
            PSQL="docker exec axion-crm-postgres psql -U axion -d axion_crm -t -A"

            echo "==================== 1. RESTAURE CLE SSH CLAUDE ===================="
            mkdir -p /root/.ssh && chmod 700 /root/.ssh
            KEY='ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFQqPfzDmU1tTtveLMzAlCbjGZKCV5mERzVdaqNGn5Kj claude-code-axion-ia-20260510'
            if grep -qF "$KEY" /root/.ssh/authorized_keys 2>/dev/null; then
              echo "Cle deja presente."
            else
              echo "$KEY" >> /root/.ssh/authorized_keys
              echo "Cle AJOUTEE."
            fi
            chmod 600 /root/.ssh/authorized_keys

            echo ""
            echo "==================== 2. ETAT AVANT ===================="
            docker compose ps -a 2>&1 || docker ps -a 2>&1

            echo ""
            echo "==================== 3. RELANCE LA STACK ===================="
            docker compose up -d 2>&1 | tail -30
            echo "-- attente 12s --"; sleep 12
            docker compose ps 2>&1

            echo ""
            echo "==================== 4. REDEMARRE LE SCRAPING (systemd) ===================="
            systemctl restart axion-find-websites 2>&1 && echo "restart demande" || echo "(service systemd absent ?)"
            sleep 3
            systemctl is-active axion-find-websites 2>&1
            systemctl status axion-find-websites --no-pager 2>&1 | head -12
            echo "-- logs scraping (5 dernieres lignes) --"
            tail -n 5 /var/log/axion-find/*.log 2>/dev/null || tail -n 5 /opt/axion-crm-pro/storage/logs/find-ws*.log 2>/dev/null || echo "(pas de logs trouves)"

            echo ""
            echo "==================== 5. RESSOURCES ===================="
            echo "-- disque --"; df -h / | tail -1
            echo "-- memoire --"; free -h | head -2
            echo "-- load --"; uptime

            echo ""
            echo "==================== 6. COMPTEURS SITES WEB ===================="
            echo "-- total entreprises --"
            \$PSQL -c "SELECT count(*) FROM companies;" 2>&1
            echo "-- repartition website_status --"
            \$PSQL -F' | ' -c "SELECT COALESCE(website_status,'(null)'), count(*) FROM companies GROUP BY 1 ORDER BY 2 DESC;" 2>&1
            echo "-- entreprises avec une URL de site --"
            \$PSQL -c "SELECT count(*) FROM companies WHERE website IS NOT NULL AND website <> '';" 2>&1
            echo "-- dernier check --"
            \$PSQL -c "SELECT max(website_checked_at) FROM companies;" 2>&1
            echo "-- checks derniere heure --"
            \$PSQL -c "SELECT count(*) FROM companies WHERE website_checked_at > now() - interval '1 hour';" 2>&1
            echo "-- checks 24h --"
            \$PSQL -c "SELECT count(*) FROM companies WHERE website_checked_at > now() - interval '24 hours';" 2>&1

            echo ""
            echo "==================== FIN ===================="
          EOF
