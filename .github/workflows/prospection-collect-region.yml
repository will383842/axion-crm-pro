name: Prospection — Collecte FRANCE entière (prod)

# Collecte séquentielle de TOUS les départements français (Isère déjà faite),
# ordonnés : Auvergne-Rhône-Alpes → Île-de-France → autres régions.
# Un job par département (matrice max-parallel=1 pour ne pas dépasser 30 req/min INSEE),
# puis reclassement (taille/secteur) + purges (non-diffusibles, non-sociétés) + stats.
#
# Sociétés commerciales seulement (filtre 5* dès la requête → ~4× plus rapide).
# Durée : ~15-25 min par département → ~1,5 jour au total sur le plan gratuit.

on:
  workflow_dispatch:
    inputs:
      req_delay:
        description: 'Délai entre requêtes INSEE (ms, 2100 = ~28/min)'
        required: false
        default: '2100'

permissions:
  contents: read

concurrency:
  group: prospection-collect-region
  cancel-in-progress: false

jobs:
  collect:
    name: Collecte ${{ matrix.dept }}
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        # Ordre : Auvergne-Rhône-Alpes (38 déjà faite) → Île-de-France → autres régions.
        dept:
          ['01','03','07','15','26','42','43','63','69','73','74',
           '75','77','78','91','92','93','94','95',
           '21','25','39','58','70','71','89','90',
           '22','29','35','56',
           '18','28','36','37','41','45',
           '2A','2B',
           '08','10','51','52','54','55','57','67','68','88',
           '02','59','60','62','80',
           '14','27','50','61','76',
           '16','17','19','23','24','33','40','47','64','79','86','87',
           '09','11','12','30','31','32','34','46','48','65','66','81','82',
           '44','49','53','72','85',
           '04','05','06','13','83','84',
           '971','972','973','974','976']
    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}

      # ssh-keyscan retire : sature MaxStartups quand d autres jobs SSH tournent
      # (StrictHostKeyChecking=no + UserKnownHostsFile=/dev/null suffisent)

      - name: Collecte département via SSH
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER || 'root' }}
          PROJECT_PATH: ${{ secrets.HETZNER_PROJECT_PATH || '/opt/axion-crm-pro' }}
          DEPT: ${{ matrix.dept }}
          REQ_DELAY: ${{ github.event.inputs.req_delay || '2100' }}
        run: |
          set -e
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$USER@$HOST" bash <<EOF
            set -euo pipefail
            cd "$PROJECT_PATH"
            echo "::group::prospection:collect $DEPT"
            docker compose exec -u root -T api php artisan prospection:collect "$DEPT" --limit=0 --req-delay="$REQ_DELAY" < /dev/null
            echo "::endgroup::"
          EOF

  reclassify:
    name: Reclassement + purges + stats
    needs: collect
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}

      # ssh-keyscan retire : sature MaxStartups quand d autres jobs SSH tournent
      # (StrictHostKeyChecking=no + UserKnownHostsFile=/dev/null suffisent)

      - name: Reclassify + stats via SSH
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER || 'root' }}
          PROJECT_PATH: ${{ secrets.HETZNER_PROJECT_PATH || '/opt/axion-crm-pro' }}
        run: |
          set -e
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$USER@$HOST" bash <<EOF
            set -euo pipefail
            cd "$PROJECT_PATH"
            docker compose exec -u root -T api php artisan prospection:purge-non-diffusible < /dev/null
            docker compose exec -u root -T api php artisan prospection:purge-non-commercial < /dev/null
            docker compose exec -u root -T api php artisan prospection:reclassify-size --all < /dev/null
            docker compose exec -u root -T api php artisan prospection:reclassify-sector --all < /dev/null
            docker compose exec -u root -T api php artisan coverage:refresh-matrix < /dev/null || echo "coverage KO (non bloquant)"
            docker compose exec -u root -T api php artisan prospection:stats < /dev/null
          EOF
