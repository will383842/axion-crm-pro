name: Prospection — Reclasser la taille (prod)

# Lance `php artisan prospection:reclassify-size` + `prospection:stats` sur le
# serveur prod via SSH. Classe la taille des entreprises déjà récupérées.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  reclassify:
    name: Reclasser taille sur prod
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}

      - name: Trust host key
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Reclassify + stats via SSH
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER || 'root' }}
          PROJECT_PATH: ${{ secrets.HETZNER_PROJECT_PATH || '/opt/axion-crm-pro' }}
        run: |
          set -e
          ssh -o StrictHostKeyChecking=no "$USER@$HOST" bash <<EOF
            set -euo pipefail
            cd "$PROJECT_PATH"
            # « < /dev/null » OBLIGATOIRE : sinon docker compose exec -T lit le reste
            # du heredoc comme stdin et avale les commandes suivantes.
            docker compose exec -u root -T api php artisan prospection:reclassify-size < /dev/null
            docker compose exec -u root -T api php artisan prospection:reclassify-sector --all < /dev/null
            docker compose exec -u root -T api php artisan prospection:stats < /dev/null
          EOF
