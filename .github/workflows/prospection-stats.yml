name: Prospection — Diagnostic (prod)

# Lance `php artisan prospection:stats` sur le serveur prod via SSH pour voir
# les workspaces + comptes d'entreprises. Déclenchement MANUEL.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  stats:
    name: Stats prospection sur prod
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}

      - name: Trust host key
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Stats via SSH
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER || 'root' }}
          PROJECT_PATH: ${{ secrets.HETZNER_PROJECT_PATH || '/opt/axion-crm-pro' }}
        run: |
          set -e
          ssh -o StrictHostKeyChecking=no "$USER@$HOST" bash <<EOF
            set -euo pipefail
            cd "$PROJECT_PATH"
            docker compose exec -u root -T api php artisan prospection:stats
          EOF
