name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1' # lundi 04:00 UTC

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Secrets scan (Gitleaks)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-24.04
    container: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep ci --config=p/owasp-top-ten --config=p/security-audit --config=p/laravel --config=p/typescript --sarif --output semgrep.sarif
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with: { sarif_file: semgrep.sarif }

  trivy:
    name: Container scan (Trivy)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: |
          docker build -t axion-crm/api:scan -f Dockerfile.laravel --target prod .
          docker build -t axion-crm/app:scan -f Dockerfile.frontend --target prod .
          docker build -t axion-crm/worker:scan -f Dockerfile.worker --target prod .
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: axion-crm/api:scan
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with: { sarif_file: trivy-api.sarif }

  composer-audit:
    name: PHP deps audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with: { php-version: '8.3' }
      - working-directory: backend
        run: composer audit --no-dev || true

  pnpm-audit:
    name: Node deps audit
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        path: [frontend, workers]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - working-directory: ${{ matrix.path }}
        run: pnpm audit --audit-level=high || true

  zap-baseline:
    name: OWASP ZAP baseline
    runs-on: ubuntu-24.04
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: zaproxy/action-baseline@v0.14.0
        with:
          target: https://staging.axion-crm-pro.com
          rules_file_name: .zap/rules.tsv
          cmd_options: '-a'
