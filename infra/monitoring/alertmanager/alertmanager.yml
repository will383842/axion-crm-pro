global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'slack-default'
  routes:
    - matchers: [severity = critical]
      receiver: 'telegram-oncall'
      group_wait: 0s
    - matchers: [severity = warning]
      receiver: 'slack-default'

receivers:
  - name: 'slack-default'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#axion-crm-alerts'
        send_resolved: true
        title: '{{ .Status | toUpper }} — {{ .GroupLabels.alertname }}'
        text: |
          *Severity:* {{ .CommonLabels.severity }}
          *Summary:* {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}

  - name: 'telegram-oncall'
    webhook_configs:
      - url: 'http://api/internal/alerts/telegram'
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials: '${ALERTMANAGER_INTERNAL_TOKEN}'

inhibit_rules:
  - source_matchers: [severity = critical]
    target_matchers: [severity = warning]
    equal: [alertname, workspace_id]
