global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: axion-crm-pro
    env: ${ENV:-local}

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: laravel-api
    metrics_path: /metrics
    static_configs:
      - targets: ['api:80']
    scheme: http

  - job_name: horizon
    metrics_path: /horizon/metrics
    static_configs:
      - targets: ['horizon:80']

  - job_name: workers
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'worker-google-maps:9100'
          - 'worker-pages-jaunes:9100'
          - 'worker-google-search:9100'

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: caddy
    static_configs:
      - targets: ['caddy:2019']
