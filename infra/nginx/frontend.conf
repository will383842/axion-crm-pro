server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Long cache pour assets immutables (hash en nom)
    location ~* \.(?:css|js|woff2?|svg|png|jpg|webp|avif|gif|ico|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Healthz
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # ----- Security headers (CSP STRICT — production-grade) -----
    # Pas de 'unsafe-inline' ni 'unsafe-eval'. Le bundle Vite production est SAFE
    # (pas d'inline). MapLibre + Tailwind CSS extraits dans des fichiers séparés.
    # Si une dépendance casse, ajouter un nonce par requête côté nginx ou utiliser
    # strict-dynamic avec hash. Plus jamais 'unsafe-inline' en prod.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=(), browsing-topics=(), microphone=(), camera=(), geolocation=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: https: blob:; connect-src 'self' https://api.axion-crm-pro.com wss://api.axion-crm-pro.com https://*.openfreemap.org; font-src 'self' data:; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;
}
